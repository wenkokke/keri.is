[bumpver]
current_version = "v23.09"
version_pattern = "v0Y.0M[.INC0]"
commit_message = "bump version {old_version} -> {new_version}"
tag_message = "{new_version}"
tag_scope = "default"
pre_commit_hook = ""
post_commit_hook = ""
commit = true
tag = true
push = true

[bumpver.file_patterns]
"bumpver.toml" = ['current_version = "{version}"']
"package.json" = ['"version": "{pep440_version}"']
