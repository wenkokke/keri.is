<nav
  class="navbar has-ratio ${ background-image }"
  role="navigation"
  aria-label="main navigation"
>
  <div class="navbar-brand">
    <a
      role="button"
      class="navbar-burger"
      aria-label="menu"
      aria-expanded="false"
      data-target="navbar"
    >
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>

  <div id="navbar" class="navbar-menu">
    <div class="navbar-start">
      ${ for(navbar-items) }
      ${ if(it.dropdown-items) }
      <div class="navbar-item has-dropdown is-hoverable">
        <a class="navbar-link" href="${ it.url }">
          ${ it.title }
        </a>
        <div class="navbar-dropdown">
          ${ for(it.dropdown-items) }
          <a class="navbar-item" href="${ it.url }">
             ${ it.title }
          </a>
          ${ endfor }
        </div>
      </div>
      ${ else }
      <a class="navbar-item" href="${ it.url }">${ it.title }</a>
      ${ endif }
      ${ endfor }
    </div>
  </div>
</nav>
