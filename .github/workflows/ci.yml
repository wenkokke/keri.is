name: Deploy to Pages

on:
  # Runs whenever a new version is published
  push:
    branches:
      - "main"

# Sets Node.js and Pandoc versions
env:
  NODEJS_VERSION: "16"
  PANDOC_VERSION: "3.1.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js ${{ env.NODEJS_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}

      - name: Setup Pandoc ${{ env.PANDOC_VERSION }}
        uses: pandoc/actions/setup@v1.0.0
        with:
          version: ${{ env.PANDOC_VERSION }}

      - name: Build Pages
        run: npm ci && npm run build
        shell: bash

  deploy:
    runs-on: ubuntu-latest

    # Only run on commits marked [deploy]
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]')

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    # Configure GitHub Pages environment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js ${{ env.NODEJS_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}

      - name: Setup Pandoc ${{ env.PANDOC_VERSION }}
        uses: pandoc/actions/setup@v1.0.0
        with:
          version: ${{ env.PANDOC_VERSION }}

      - name: Build Pages
        run: npm ci && npm run build
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
