<section class="hero is-primary">
  <!-- Hero head: will stick at the top -->
  ${ if(navbar) }
  <div class="hero-head">
    ${ if(background-image) }
    <figure class="image is-16by9">${ navbar() }</figure>
    ${ else }
    ${ navbar() }
    ${ endif }
  </div>
  ${ endif }

  <!-- Hero content: will be in the middle -->
  <div class="hero-body">
    <h1 class="title" role="heading" aria-level="1">${ title }</h1>
  </div>
</section>
